# render
num_views: 0

# trellis
trellis_img_model_name: "JeffreyXiang/TRELLIS-image-large"
# Local pipeline config that mixes TRELLIS-image-large (encoder/decoder/SLAT
# decoders) with TRELLIS-text-xlarge (sparse-structure & SLAT flow models).
# Necessary for spatial-control: microsoft/TRELLIS-text-large does not ship a
# sparse_structure_encoder, but encode_spatial_control() requires one.
trellis_text_model_name: "config/trellis_pipeline"
flow_model_in_channels: 8

img_model:
  rescale_t: 3.0
  cfg_strength: 5.0
  cfg_interval: [0.5, 1.0]

text_model:
  rescale_t: 3.0
  cfg_strength: 7.5
  cfg_interval: [0.5, 9.5]

# self-similarity guidance
sim_guidance:
  num_part_clusters: 10
  steps: 300
  learning_rate: 5e-4
  loss_weight: 1.0
  local_condition_dilation: 0
  local_condition_min_cells: 192
  local_condition_max_dilation: 1

log_every: 100
