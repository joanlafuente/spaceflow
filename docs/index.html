<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpaceFlow — User Study</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./static/css/style.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .landing-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 8px 48px rgba(0,0,0,0.10);
      padding: 48px 44px 40px;
      width: 100%;
      max-width: 460px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    /* Logo */
    .landing-logo {
      width: 260px;
      height: auto;
      mix-blend-mode: multiply; /* makes white background transparent */
      margin-bottom: 8px;
    }

    /* Title & subtitle */
    .landing-title {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
    }

    .landing-subtitle {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 32px;
    }

    /* Divider */
    .landing-divider {
      width: 100%;
      height: 1px;
      background: var(--border);
      margin-bottom: 28px;
    }

    /* Form */
    .landing-form {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .landing-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      text-align: left;
      margin-bottom: 2px;
    }

    .landing-input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s;
      color: var(--text);
    }
    .landing-input:focus { border-color: var(--accent); }

    .landing-error {
      font-size: 13px;
      color: var(--red);
      text-align: left;
      min-height: 18px;
    }

    /* Study info pill */
    .study-info {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin: 4px 0;
    }

    .study-info-pill {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 13px;
      color: var(--text-muted);
    }

    /* Start button */
    .landing-btn {
      width: 100%;
      padding: 14px;
      background: var(--text);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 4px;
    }
    .landing-btn:hover { background: #333; }

    /* Disclaimer */
    .landing-disclaimer {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      width: 100%;
      text-align: center;
    }

    @media (max-width: 520px) {
      .landing-card { padding: 36px 24px 32px; }
      .landing-logo { width: 200px; }
      .landing-title { font-size: 19px; }
    }
  </style>
</head>
<body>

  <div class="landing-card">

    <img src="./static/img/spaceflow_logo.png"
         alt="SpaceFlow"
         class="landing-logo">

    <h1 class="landing-title">3D Generation User Study</h1>
    <p class="landing-subtitle">Evaluating Local Geometric Control</p>

    <div class="landing-divider"></div>

    <div class="landing-form">
      <div class="landing-label">Your name or nickname</div>
      <input type="text" id="username-input" class="landing-input"
             placeholder="Enter any name" autocomplete="off">
      <div class="landing-error" id="username-error"></div>

      <div class="study-info">
        <span class="study-info-pill">10 pairwise comparisons</span>
        <span class="study-info-pill">~15 minutes</span>
      </div>

      <button class="landing-btn" id="start-btn">Start Study →</button>
    </div>

    <p class="landing-disclaimer">
      Your responses are anonymous and used solely for academic
      research at ETH Zurich. You may stop at any time.
    </p>

  </div>

  <script>
    const USERNAME_KEY = 'spaceflow_username';

    document.getElementById('start-btn').addEventListener('click', startStudy);
    document.getElementById('username-input').addEventListener('keypress', e => {
      if (e.key === 'Enter') startStudy();
    });

    function startStudy() {
      const input = document.getElementById('username-input');
      const error = document.getElementById('username-error');
      const name  = input.value.trim();
      if (!name) {
        error.textContent = 'Please enter a name to continue.';
        input.focus();
        return;
      }
      localStorage.setItem(USERNAME_KEY, name);
      window.location.href = './tau.html';
    }
  </script>

</body>
</html>
